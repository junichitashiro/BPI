<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --paper: #f7f7f4;
    --surface: #ffffff;
    --ink: #1a1c20;
    --ink-soft: #5a6068;
    --line: #e2e2dc;
    --line-strong: #cfcfc7;
    --accent: #3b4cca;
    --accent-soft: #eceffb;
    --hit: #fff8e6;
    --radius: 8px;
    --mono: "SFMono-Regular", "SF Mono", Consolas, "Roboto Mono", monospace;
    --sans: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #16181c;
      --surface: #1e2126;
      --ink: #e9eaec;
      --ink-soft: #9aa0a8;
      --line: #2e3238;
      --line-strong: #3c424a;
      --accent: #8b9bff;
      --accent-soft: #262b3d;
      --hit: #2e2a18;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  header.top { margin-bottom: 22px; }
  header.top h1 {
    font-size: 17px; font-weight: 700; margin: 0; letter-spacing: 0.02em;
    display: flex; align-items: baseline; gap: 10px;
  }
  header.top h1 .tag {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--ink-soft); border: 1px solid var(--line-strong);
    padding: 1px 7px; border-radius: 20px; letter-spacing: 0;
  }
  header.top p { margin: 6px 0 0; color: var(--ink-soft); font-size: 12.5px; }

  /* drop zone */
  .drop {
    border: 1.5px dashed var(--line-strong);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: var(--accent-soft); }
  .drop .big { font-size: 14px; font-weight: 600; }
  .drop .sub { color: var(--ink-soft); font-size: 12px; margin-top: 6px; }
  .drop input { display: none; }

  /* panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  select {
    font-family: var(--sans); font-size: 14px; color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line-strong); border-radius: 6px;
    padding: 8px 10px; outline: none; min-width: 180px;
  }
  select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  /* column toggles */
  .cols-head {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--ink-soft);
    margin: 16px 0 8px; display: flex; gap: 12px; align-items: center;
  }
  .cols-head a { color: var(--accent); cursor: pointer; text-transform: none; letter-spacing: 0; font-size: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-size: 12.5px; padding: 4px 11px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line-strong); color: var(--ink-soft); background: var(--surface);
    user-select: none; transition: all .12s;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* count */
  .count {
    font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft);
    margin: 4px 2px 10px; display: flex; align-items: center; gap: 14px;
  }
  .count b { color: var(--ink); font-weight: 600; }
  .count .clear {
    font-family: var(--sans); color: var(--accent); cursor: pointer; font-size: 12.5px;
  }
  .count .clear.off { color: var(--line-strong); cursor: default; }

  /* table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px; white-space: nowrap; border-bottom: 1px solid var(--line); }

  thead th.name {
    position: sticky; top: 0; z-index: 3; background: var(--surface);
    font-weight: 600; font-size: 12px; color: var(--ink-soft);
    height: 34px; border-bottom: none;
  }
  thead th.filter {
    position: sticky; top: 34px; z-index: 2; background: var(--surface);
    padding: 0 8px 8px; border-bottom: 1.5px solid var(--line-strong);
  }
  thead th.filter.active { color: var(--accent); }
  .fcell { display: flex; flex-direction: column; }
  .fcell input {
    font-family: var(--sans); font-size: 12.5px; color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line-strong); border-radius: 5px;
    padding: 5px 8px; outline: none; width: 100%; min-width: 120px;
  }
  .fcell input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .fcell input.has-value { border-color: var(--accent); }

  tbody tr:hover td { background: var(--hit); }
  td.empty { color: var(--line-strong); }
  mark { background: #ffe58a; color: inherit; border-radius: 2px; padding: 0 1px; }
  @media (prefers-color-scheme: dark) { mark { background: #6b5a18; } }

  .empty-state { text-align: center; color: var(--ink-soft); padding: 40px; font-size: 13px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>MasterLens <span class="tag">.xlsx / .csv</span></h1>
    <p>エクセルを読み込み、各列の見出し下の欄に入力すると、その列で絞り込みます。複数の列に入力すると、すべての条件を満たす行だけが残ります。データはブラウザ内で処理され、外部には送信されません。</p>
  </header>

  <div class="drop" id="drop">
    <div class="big">エクセルファイルをここにドロップ</div>
    <div class="sub">またはクリックして選択（.xlsx / .xls / .csv）</div>
    <input type="file" id="file" accept=".xlsx,.xls,.csv">
  </div>

  <div id="app" class="hidden">
    <div class="panel">
      <div class="row">
        <div class="field" id="sheetField" style="display:none">
          <label>シート</label>
          <select id="sheetSel"></select>
        </div>
      </div>
      <div class="cols-head">
        表示する列
        <a id="allCols">すべて表示</a>
        <a id="noCols">すべて隠す</a>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <div class="count" id="count"></div>
    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <datalist id="datalists-holder"></datalist>
  </div>
</div>

<script>
(function () {
  "use strict";

  var state = {
    workbook: null,
    sheetName: null,
    headers: [],     // 列名
    rows: [],        // 各行: { 列名: 値文字列 }
    visible: {},     // 列名 -> 表示するか(bool)
    filters: {}      // 列名 -> 絞り込みワード（隠した列も値は保持）
  };

  var els = {
    drop:    document.getElementById("drop"),
    file:    document.getElementById("file"),
    app:     document.getElementById("app"),
    sheetField: document.getElementById("sheetField"),
    sheetSel: document.getElementById("sheetSel"),
    chips:   document.getElementById("chips"),
    count:   document.getElementById("count"),
    thead:   document.getElementById("thead"),
    tbody:   document.getElementById("tbody"),
    dlHolder:document.getElementById("datalists-holder"),
    allCols: document.getElementById("allCols"),
    noCols:  document.getElementById("noCols")
  };

  /* ---------- ファイル読み込み ---------- */
  els.drop.addEventListener("click", function () { els.file.click(); });
  els.drop.addEventListener("dragover", function (e) { e.preventDefault(); els.drop.classList.add("over"); });
  els.drop.addEventListener("dragleave", function () { els.drop.classList.remove("over"); });
  els.drop.addEventListener("drop", function (e) {
    e.preventDefault(); els.drop.classList.remove("over");
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  els.file.addEventListener("change", function (e) {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        state.workbook = XLSX.read(ev.target.result, { type: "array" });
      } catch (err) {
        alert("ファイルを読み込めませんでした。対応形式は .xlsx / .xls / .csv です。");
        return;
      }
      buildSheetSelector();
      els.app.classList.remove("hidden");
      els.drop.querySelector(".big").textContent = file.name + " を読み込み済み";
      els.drop.querySelector(".sub").textContent = "別のファイルに差し替えるにはここをクリック";
    };
    reader.readAsArrayBuffer(file);
  }

  /* ---------- シート ---------- */
  function buildSheetSelector() {
    var names = state.workbook.SheetNames;
    if (names.length > 1) {
      els.sheetField.style.display = "";
      els.sheetSel.innerHTML = names.map(function (n) {
        return '<option value="' + escAttr(n) + '">' + escHtml(n) + "</option>";
      }).join("");
    } else {
      els.sheetField.style.display = "none";
    }
    loadSheet(names[0]);
  }
  els.sheetSel.addEventListener("change", function () { loadSheet(els.sheetSel.value); });

  function loadSheet(name) {
    state.sheetName = name;
    var sheet = state.workbook.Sheets[name];
    var aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: false });
    aoa = aoa.filter(function (r) { return r.some(function (c) { return String(c).trim() !== ""; }); });
    if (!aoa.length) { state.headers = []; state.rows = []; buildTable(); renderBody(); return; }

    state.headers = aoa[0].map(function (h, i) {
      var t = String(h).trim();
      return t === "" ? "列" + (i + 1) : t;
    });
    state.rows = aoa.slice(1).map(function (r) {
      var obj = {};
      state.headers.forEach(function (h, i) { obj[h] = String(r[i] == null ? "" : r[i]); });
      return obj;
    });

    state.visible = {};
    state.filters = {};
    state.headers.forEach(function (h) { state.visible[h] = true; state.filters[h] = ""; });

    buildChips();
    buildTable();   // ヘッダ（列名＋フィルタ欄）を構築
    renderBody();   // 行を描画
  }

  /* ---------- 表示列チップ ---------- */
  function buildChips() {
    els.chips.innerHTML = "";
    state.headers.forEach(function (h) {
      var chip = document.createElement("span");
      chip.className = "chip" + (state.visible[h] ? " on" : "");
      chip.textContent = h;
      chip.addEventListener("click", function () {
        state.visible[h] = !state.visible[h];
        chip.classList.toggle("on", state.visible[h]);
        buildTable();
        renderBody();
      });
      els.chips.appendChild(chip);
    });
  }
  els.allCols.addEventListener("click", function () {
    state.headers.forEach(function (h) { state.visible[h] = true; });
    buildChips(); buildTable(); renderBody();
  });
  els.noCols.addEventListener("click", function () {
    state.headers.forEach(function (h) { state.visible[h] = false; });
    buildChips(); buildTable(); renderBody();
  });

  /* ---------- ヘッダ（列名＋フィルタ欄）構築：表示列が変わった時だけ ---------- */
  function visibleCols() {
    return state.headers.filter(function (h) { return state.visible[h]; });
  }

  function buildTable() {
    var cols = visibleCols();

    // 列ごとの候補(datalist)を生成
    els.dlHolder.innerHTML = cols.map(function (h, i) {
      return '<datalist id="dl-' + i + '">' + uniqueOptions(h) + "</datalist>";
    }).join("");

    // 1段目：列名 ／ 2段目：フィルタ入力欄
    var nameRow = "<tr>" + cols.map(function (h) {
      var active = state.filters[h] ? " active" : "";
      return '<th class="name' + active + '">' + escHtml(h) + "</th>";
    }).join("") + "</tr>";

    var filterRow = "<tr>" + cols.map(function (h, i) {
      return '<th class="filter">' +
        '<div class="fcell"><input type="text" list="dl-' + i + '" autocomplete="off" ' +
        'data-col="' + escAttr(h) + '" placeholder="絞り込み" value="' + escAttr(state.filters[h]) + '"></div>' +
        "</th>";
    }).join("") + "</tr>";

    els.thead.innerHTML = nameRow + filterRow;

    // 各フィルタ欄にイベントを付与（入力時は本体のみ更新）
    var inputs = els.thead.querySelectorAll("input[data-col]");
    inputs.forEach(function (inp) {
      inp.classList.toggle("has-value", inp.value.trim() !== "");
      inp.addEventListener("input", function () {
        state.filters[inp.getAttribute("data-col")] = inp.value;
        inp.classList.toggle("has-value", inp.value.trim() !== "");
        updateActiveHeaders();
        renderBody();
      });
    });
  }

  function updateActiveHeaders() {
    var nameThs = els.thead.querySelectorAll("th.name");
    var cols = visibleCols();
    nameThs.forEach(function (th, i) {
      th.classList.toggle("active", !!(state.filters[cols[i]] && state.filters[cols[i]].trim() !== ""));
    });
  }

  /* ---------- 候補(列ごとのdatalist) ---------- */
  function uniqueOptions(col) {
    var seen = {}, opts = [];
    for (var i = 0; i < state.rows.length; i++) {
      var v = state.rows[i][col];
      if (v && v.trim() !== "" && !seen[v]) { seen[v] = 1; opts.push(v); }
      if (opts.length >= 1000) break;
    }
    opts.sort();
    return opts.map(function (v) { return '<option value="' + escAttr(v) + '">'; }).join("");
  }

  /* ---------- 本体（行）描画：入力のたびに呼ぶ ---------- */
  function renderBody() {
    var cols = visibleCols();

    // 有効な条件（表示中かつ値あり）を集める
    var active = [];
    cols.forEach(function (h) {
      var q = (state.filters[h] || "").trim().toLowerCase();
      if (q !== "") active.push({ col: h, q: q });
    });

    var filtered = active.length === 0 ? state.rows : state.rows.filter(function (r) {
      return active.every(function (c) { return r[c.col].toLowerCase().indexOf(c.q) !== -1; });
    });

    if (cols.length === 0) {
      els.tbody.innerHTML = '<tr><td class="empty-state">表示する列が選択されていません</td></tr>';
    } else if (filtered.length === 0) {
      els.tbody.innerHTML = '<tr><td class="empty-state" colspan="' + cols.length + '">条件に一致する行はありません</td></tr>';
    } else {
      var qByCol = {};
      active.forEach(function (c) { qByCol[c.col] = c.q; });
      var html = "";
      for (var i = 0; i < filtered.length; i++) {
        html += "<tr>";
        for (var j = 0; j < cols.length; j++) {
          var col = cols[j], val = filtered[i][col];
          if (val === "") { html += '<td class="empty">—</td>'; continue; }
          var cell = qByCol[col] ? highlight(val, qByCol[col]) : escHtml(val);
          html += "<td>" + cell + "</td>";
        }
        html += "</tr>";
      }
      els.tbody.innerHTML = html;
    }

    // 件数＋クリア
    var hasFilter = active.length > 0;
    els.count.innerHTML =
      "<span><b>" + filtered.length + "</b> / " + state.rows.length + " 件" +
      (hasFilter ? "（" + active.length + " 列で絞り込み）" : "") + "</span>" +
      '<span class="clear' + (hasFilter ? "" : " off") + '" id="clearLink">絞り込みをクリア</span>';

    var clearLink = document.getElementById("clearLink");
    if (clearLink && hasFilter) {
      clearLink.addEventListener("click", clearAll);
    }
  }

  function clearAll() {
    state.headers.forEach(function (h) { state.filters[h] = ""; });
    var inputs = els.thead.querySelectorAll("input[data-col]");
    inputs.forEach(function (inp) { inp.value = ""; inp.classList.remove("has-value"); });
    updateActiveHeaders();
    renderBody();
  }

  /* ---------- ユーティリティ ---------- */
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function escAttr(s) { return escHtml(s); }
  function highlight(text, q) {
    var lower = text.toLowerCase(), out = "", idx = 0, pos;
    while ((pos = lower.indexOf(q, idx)) !== -1) {
      out += escHtml(text.slice(idx, pos)) + "<mark>" + escHtml(text.slice(pos, pos + q.length)) + "</mark>";
      idx = pos + q.length;
    }
    out += escHtml(text.slice(idx));
    return out;
  }
})();
</script>
</body>
</html>
